name: Pace

# XcodeGen spec. This YAML is the source of truth for the Xcode project;
# the generated .xcodeproj is disposable (git-ignored). Regenerate with:
#   xcodegen generate

options:
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

# Project-level signing config lives in an xcconfig so a real Team ID and
# bundle id can stay in the git-ignored Configuration/Local.xcconfig.
configFiles:
  Debug: Configuration/Shared.xcconfig
  Release: Configuration/Shared.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: "YES"      # required for notarization
    GENERATE_INFOPLIST_FILE: "YES"
    DEAD_CODE_STRIPPING: "YES"
    # Xcode 15+ sandboxes script phases so they can only write declared outputs.
    # ditto (used by XcodeGen's generated header-copy phase and our CLI-embed
    # phase) stages through an undeclared temp file next to the destination,
    # which the sandbox denies on incremental builds.
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

targets:
  PaceCore:
    type: library.static
    platform: macOS
    sources:
      - Sources/PaceCore
    settings:
      base:
        PRODUCT_NAME: PaceCore
        DEFINES_MODULE: YES

  Pace:
    type: application
    platform: macOS
    sources:
      - Sources/PaceApp
    dependencies:
      - target: PaceCore
      - target: PaceCLI
    settings:
      base:
        PRODUCT_NAME: Pace
        COMBINE_HIDPI_IMAGES: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSUIElement: "YES"
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
    postBuildScripts:
      - name: Embed Pace CLI
        script: |
          mkdir -p "${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Helpers"
          ditto "${BUILT_PRODUCTS_DIR}/pace" "${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Helpers/pace"
        inputFiles:
          - "$(BUILT_PRODUCTS_DIR)/pace"
        outputFiles:
          - "$(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Helpers/pace"
    entitlements:
      path: App.entitlements
      properties:
        com.apple.security.app-sandbox: false

  PaceCLI:
    type: tool
    platform: macOS
    sources:
      - Sources/PaceCLI
    dependencies:
      - target: PaceCore
    settings:
      base:
        PRODUCT_NAME: pace
        PRODUCT_MODULE_NAME: PaceCommand
        # The CLI ships inside Pace.app/Contents/Helpers via the embed script,
        # which copies from BUILT_PRODUCTS_DIR. Installing it into the archive
        # as well would put a second product beside the app, turning the
        # archive generic — and -exportArchive rejects generic archives.
        SKIP_INSTALL: "YES"

  PaceTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/PaceCoreTests
    dependencies:
      - target: PaceCore

schemes:
  Pace:
    build:
      targets:
        Pace: all
        PaceCLI: all
        PaceCore: all
        PaceTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - PaceTests
    archive:
      config: Release

  PaceCLI:
    build:
      targets:
        PaceCLI: all
        PaceCore: all
    run:
      config: Debug
    archive:
      config: Release
