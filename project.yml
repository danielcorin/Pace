name: Pace

# XcodeGen spec. This YAML is the source of truth for the Xcode project;
# the generated .xcodeproj is disposable (git-ignored). Regenerate with:
#   xcodegen generate

options:
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

# Project-level signing config lives in an xcconfig so a real Team ID and
# bundle id can stay in the git-ignored Configuration/Local.xcconfig.
configFiles:
  Debug: Configuration/Shared.xcconfig
  Release: Configuration/Shared.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: "YES"      # required for notarization
    GENERATE_INFOPLIST_FILE: "YES"
    DEAD_CODE_STRIPPING: "YES"

targets:
  Pace:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_NAME: Pace
        COMBINE_HIDPI_IMAGES: "YES"
        INFOPLIST_KEY_LSUIElement: "NO"          # set to YES for a menu-bar/agent app
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
    entitlements:
      path: App.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true

  PaceTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: Pace

schemes:
  Pace:
    build:
      targets:
        Pace: all
        PaceTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - PaceTests
    archive:
      config: Release
